<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/favicon.png">

<style>
:root {
  --noir: #121212;
  --bleu: #295079;
  --argile: #C4934A;
  --sable: #C8A97A;
  --creme: #F5F0E5;
}

body {
  background-color: var(--noir) !important;
  color: var(--creme) !important;
  font-family: 'Jost', sans-serif !important;
  font-weight: 300;
}

/* MASQUER HEADER ANANKE */
body > header:not(.strates-header) {
  display: none !important;
}

/* HEADER CUSTOM */
.strates-header {
  display: flex !important;
  background: var(--noir);
  border-bottom: 1px solid var(--argile);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.header-logo-link {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none !important;
}

.site-logo {
  height: 36px;
  width: 36px;
  object-fit: contain;
}

.header-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  color: var(--sable);
}

.header-nav {
  display: flex;
  gap: 32px;
}

.nav-link {
  font-family: 'Jost', sans-serif !important;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--sable) !important;
  text-decoration: none !important;
  transition: color 0.2s;
}

.nav-link:hover {
  color: var(--argile) !important;
}

/* HERO */
h1, h2, h3 {
  color: var(--sable) !important;
  font-family: 'Cinzel', serif !important;
  letter-spacing: 0.1em;
}

.hero-full {
  background: var(--noir);
  text-align: center;
  padding: 80px 20px 60px 20px;
  border-bottom: 1px solid var(--argile);
  width: 100%;
}

.hero-title {
  font-family: 'Cinzel', serif !important;
  font-size: clamp(2.5rem, 8vw, 5rem) !important;
  font-weight: 600 !important;
  color: var(--sable) !important;
  letter-spacing: 0.3em !important;
  margin-bottom: 16px !important;
}

.hero-sub {
  font-family: 'Cormorant Garamond', serif !important;
  font-style: italic;
  font-size: 1.1rem !important;
  color: rgba(200,169,122,0.7) !important;
  letter-spacing: 0.15em;
}

/* FOOTER */
footer {
  background-color: var(--noir) !important;
  border-top: 1px solid var(--argile) !important;
  color: var(--sable) !important;
  text-align: center;
  padding: 32px !important;
}

.footer-content {
  max-width: 700px;
  margin: 0 auto;
}

.footer-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--argile);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.footer-links {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,240,229,0.4);
  margin-top: 8px;
}

.footer-links a {
  color: rgba(245,240,229,0.5) !important;
  text-decoration: none !important;
  margin: 0 12px;
}

.footer-links a:hover {
  color: var(--argile) !important;
}

a { color: var(--argile) !important; }
a:hover { color: var(--sable) !important; }

article, .content-body {
  background-color: var(--noir) !important;
  color: var(--creme) !important;
}

/* INTRO ACCUEIL */
.home-intro {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 40px auto;
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.2rem !important;
  font-style: italic;
  color: var(--sable) !important;
  line-height: 1.8;
}

/* GRILLE PODCASTS */
.podcasts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin: 48px auto;
  padding: 0 16px;
  max-width: 700px;
}

.podcast-card {
  background: #1C1C1C;
  border: 1px solid var(--argile);
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}

.podcast-card:hover {
  transform: translateY(-4px);
  border-color: var(--sable);
}

.podcast-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}

.podcast-card-body {
  padding: 16px;
}

.podcast-card-title {
  font-family: 'Cinzel', serif !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.08em;
  color: var(--sable) !important;
  margin: 0 0 8px 0;
  text-transform: uppercase;
}

.podcast-card-desc {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 0.95rem !important;
  color: rgba(245,240,229,0.6) !important;
  line-height: 1.5;
  margin: 0 0 12px 0;
}

.podcast-card-status {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid currentColor;
  display: inline-block;
  font-family: 'Jost', sans-serif !important;
}

.status-live { color: #4CAF50; }
.status-soon { color: var(--argile); }
.status-tbd { color: var(--bleu); }

.podcasts-section-title {
  font-family: 'Cinzel', serif !important;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--argile);
  text-align: center;
  margin: 48px 0 0 0;
}

a.podcast-card {
  text-decoration: none !important;
  display: block;
}

/* PAGES PODCASTS */
.podcast-page {
  display: flex;
  gap: 40px;
  margin: 40px auto;
  align-items: flex-start;
  max-width: 800px;
  padding: 0 16px;
}

.podcast-page img {
  width: 280px;
  flex-shrink: 0;
  border: 1px solid var(--argile);
}

.podcast-page-content p {
  font-family: 'Cormorant Garamond', serif !important;
  color: var(--creme) !important;
  line-height: 1.8 !important;
  margin-bottom: 16px !important;
  font-size: 1.05rem !important;
}

.podcast-btn {
  display: inline-block;
  padding: 12px 24px;
  background: var(--bleu);
  color: var(--creme) !important;
  text-decoration: none !important;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-size: 0.75rem;
  margin-top: 16px;
  border: 1px solid var(--argile);
  font-family: 'Jost', sans-serif !important;
  transition: background 0.2s;
}

.podcast-btn:hover {
  background: var(--argile) !important;
  color: var(--noir) !important;
}

/* PAGES A PROPOS / SOUTENIR */
.about-page {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 16px;
}

.about-intro {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.3rem !important;
  font-style: italic;
  color: var(--sable) !important;
  line-height: 1.8 !important;
  margin-bottom: 40px !important;
}

.about-block {
  margin-bottom: 36px;
  padding-bottom: 36px;
  border-bottom: 1px solid rgba(196,147,74,0.2);
}

.about-block:last-child {
  border-bottom: none;
}

.about-block h3 {
  font-family: 'Cinzel', serif !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.25em;
  color: var(--argile) !important;
  margin-bottom: 14px !important;
}

.about-block p {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.05rem !important;
  color: rgba(245,240,229,0.75) !important;
  line-height: 1.8 !important;
}

/* RESPONSIVE MOBILE */
@media (max-width: 640px) {
  .podcasts-grid {
    grid-template-columns: 1fr;
    max-width: 340px;
  }
  .podcast-page {
    flex-direction: column;
  }
  .podcast-page img {
    width: 100%;
  }
  .header-inner {
    padding: 12px 16px;
  }
  .site-logo {
    height: 28px;
    width: 28px;
  }
  .header-nav {
    gap: 16px;
  }
}
/* PLAYER GLOBAL */
.player-global {
  max-width: 800px;
  margin: 40px auto;
  padding: 0 16px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Injecter header custom avant le header Ananke
  var body = document.body;
  var anankeHeader = document.querySelector('header');

  var customHeader = document.createElement('header');
  customHeader.className = 'strates-header';
  customHeader.innerHTML = `
    <div class="header-inner">
      <a href="/" class="header-logo-link">
        <img src="/favicon.png" class="site-logo" alt="Strates">
        <span class="header-title">STRATES</span>
      </a>
      <nav class="header-nav">
        <a href="/podcasts/" class="nav-link">Podcasts</a>
        <a href="/a-propos/" class="nav-link">À propos</a>
        <a href="/soutenir/" class="nav-link">Soutenir</a>
      </nav>
    </div>
  `;

  body.insertBefore(customHeader, body.firstChild);

  // Footer enrichi
  var footer = document.querySelector('footer');
  if (footer && !footer.querySelector('.footer-content')) {
    footer.innerHTML = '<div class="footer-content"><p class="footer-tagline">Tout explorer, ne rien figer.</p><p class="footer-links"><a href="mailto:stratespodcasts@gmail.com">Contact</a><a href="https://galaxiepop.fr" target="_blank">Galaxie Pop</a></p><p style="font-size:0.65rem;color:rgba(245,240,229,0.2);margin-top:12px;letter-spacing:0.2em;">© STRATES 2026</p></div>';
  }
});
</script>
