<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --noir: #121212;
  --bleu: #295079;
  --argile: #C4934A;
  --sable: #C8A97A;
  --creme: #F5F0E5;
}

body {
  font-family: 'Jost', sans-serif !important;
  font-weight: 300;
}

h1, h2, h3, .podcast-card-title, .podcasts-section-title {
  font-family: 'Cinzel', serif !important;
}

.podcast-card-desc, article p, .podcast-page-content p {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.1rem !important;
  line-height: 1.8 !important;
}

nav a, header a {
  font-family: 'Jost', sans-serif !important;
  letter-spacing: 0.15em;
  font-weight: 400;
}

body {
  background-color: var(--noir) !important;
  color: var(--creme) !important;
}

header {
  background-color: var(--bleu) !important;
  border-bottom: 2px solid var(--argile) !important;
}

footer {
  background-color: var(--noir) !important;
  border-top: 2px solid var(--argile) !important;
  color: var(--sable) !important;
}

h1, h2, h3 {
  color: var(--sable) !important;
  letter-spacing: 0.1em;
}

a { color: var(--argile) !important; }
a:hover { color: var(--sable) !important; }

article, .content-body {
  background-color: var(--noir) !important;
  color: var(--creme) !important;
}

/* GRILLE PODCASTS */
.podcasts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin: 48px auto;
  padding: 0 16px;
  max-width: 700px;
}

.podcast-card {
  background: #1C1C1C;
  border: 1px solid var(--argile);
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}

.podcast-card:hover {
  transform: translateY(-4px);
  border-color: var(--sable);
}

.podcast-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}

.podcast-card-body {
  padding: 16px;
}

.podcast-card-title {
  font-family: Georgia, serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  color: var(--sable);
  margin: 0 0 8px 0;
  text-transform: uppercase;
}

.podcast-card-desc {
  font-size: 0.8rem;
  color: rgba(245,240,229,0.6);
  line-height: 1.5;
  margin: 0 0 12px 0;
}

.podcast-card-status {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid currentColor;
  display: inline-block;
}

.status-live { color: #4CAF50; }
.status-soon { color: var(--argile); }
.status-tbd { color: var(--bleu); }

.podcasts-section-title {
  font-family: Georgia, serif;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--argile);
  text-align: center;
  margin: 48px 0 0 0;
}

a.podcast-card {
  text-decoration: none !important;
  display: block;
}
.podcast-page {
  display: flex;
  gap: 40px;
  margin: 40px 0;
  align-items: flex-start;
}

.podcast-page img {
  width: 300px;
  flex-shrink: 0;
  border: 1px solid var(--argile);
}

.podcast-page-content p {
  color: var(--creme);
  line-height: 1.8;
  margin-bottom: 16px;
}

.podcast-btn {
  display: inline-block;
  padding: 12px 24px;
  background: var(--bleu);
  color: var(--creme) !important;
  text-decoration: none !important;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-size: 0.8rem;
  margin-top: 16px;
  border: 1px solid var(--argile);
  transition: background 0.2s;
}

.podcast-btn:hover {
  background: var(--argile) !important;
  color: var(--noir) !important;
}

@media (max-width: 640px) {
  .podcast-page {
    flex-direction: column;
  }
  .podcast-page img {
    width: 100%;
  }
  .podcasts-grid {
    grid-template-columns: 1fr;
  }
}
.about-page {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 16px;
}

.about-intro {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.3rem !important;
  font-style: italic;
  color: var(--sable) !important;
  line-height: 1.8 !important;
  margin-bottom: 40px !important;
}

.about-block {
  margin-bottom: 36px;
  padding-bottom: 36px;
  border-bottom: 1px solid rgba(196,147,74,0.2);
}

.about-block:last-child {
  border-bottom: none;
}

.about-block h3 {
  font-family: 'Cinzel', serif !important;
  font-size: 0.85rem !important;
  letter-spacing: 0.25em;
  color: var(--argile) !important;
  margin-bottom: 14px !important;
}

.about-block p {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.05rem !important;
  color: rgba(245,240,229,0.75) !important;
  line-height: 1.8 !important;
}
</style>
